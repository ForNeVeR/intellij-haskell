# This file is auto-generated by scripts/github-actions.fsx
name: Release
on:
  push:
    branches:
    - master
    - renovate/**
    tags:
    - v*
  pull_request:
    branches:
    - master
jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
    - name: Check out the sources
      uses: actions/checkout@v6
    - id: version
      name: Get version
      shell: pwsh
      run: '"version=$(scripts/Get-Version.ps1 -RefName $env:GITHUB_REF)" >> $env:GITHUB_OUTPUT'
    - name: Read the changelog
      uses: ForNeVeR/ChangelogAutomation.action@v2
      with:
        input: ./CHANGELOG.md
        output: ./release-notes.md
    - name: Upload the changelog
      uses: actions/upload-artifact@v7
      with:
        name: release-notes.md
        path: ./release-notes.md
    - name: Cache downloaded JDK
      uses: actions/cache@v5
      with:
        key: ${{ runner.os }}-${{ hashFiles('gradlew*') }}
        path: ~/.local/share/gradle-jvm
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
    - name: Build the plugin
      shell: pwsh
      run: ./gradlew buildPlugin
    - name: Upload the plugin
      uses: actions/upload-artifact@v7
      with:
        name: haskeletor-${{ steps.version.outputs.version }}.zip
        path: build/distributions/haskeletor-${{ steps.version.outputs.version }}.zip
    - if: startsWith(github.ref, 'refs/tags/v')
      name: Create a release
      uses: softprops/action-gh-release@v2
      with:
        body_path: ./release-notes.md
        files: build/distributions/haskeletor-${{ steps.version.outputs.version }}.zip
        name: Haskeletor v${{ steps.version.outputs.version }}
    - if: startsWith(github.ref, 'refs/tags/v')
      name: Publish the plugin
      shell: pwsh
      run: ./gradlew publishPlugin
      working-directory: intellij
      env:
        PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
