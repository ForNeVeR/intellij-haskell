version = 1
SPDX-PackageName = "haskeletor"
SPDX-PackageSupplier = "haskeletor contributors <https://github.com/ForNeVeR/haskeletor>"
SPDX-PackageDownloadLocation = "https://github.com/ForNeVeR/haskeletor"

[[annotations]]
path = "gen/**"
precedence = "aggregate"
SPDX-FileCopyrightText = [
    "2014-2022 Rik van der Kleij",
    "2014-2022 intellij-haskell contributors <https://github.com/rikvdkleij/intellij-haskell>"
]
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = [
    "gradle/wrapper/gradle-wrapper.jar",
    "gradle/wrapper/gradle-wrapper.properties"
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Gradle authors <https://gradle.org/>"
SPDX-License-Identifier = "Apache-2.0"
